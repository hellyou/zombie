<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物大战僵尸 - 双人对战</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Start Screen -->
    <div id="start-screen" class="screen">
      <h1>🌱 植物大战僵尸 🧟</h1>
      <h2>双人对战</h2>
      <p>防守方: 键鼠 | 进攻方: 键盘/手柄</p>
      <button id="start-btn">🏠 本地对战</button>
      <button id="online-btn">🌐 联机对战</button>
    </div>

    <!-- Room Screen -->
    <div id="room-screen" class="screen hidden">
      <h2>🌐 联机对战</h2>
      <div class="room-actions">
        <button id="create-room-btn">创建房间</button>
        <div class="join-section">
          <input id="room-code-input" type="text" maxlength="4" placeholder="输入房间码" autocomplete="off">
          <button id="join-room-btn">加入房间</button>
        </div>
      </div>
      <div id="room-status"></div>
      <button id="room-back-btn">← 返回</button>
    </div>

    <!-- Waiting Screen -->
    <div id="waiting-screen" class="screen hidden">
      <h2>等待对手加入...</h2>
      <div id="room-code-display">----</div>
      <p class="waiting-hint">将房间码告诉你的对手</p>
      <button id="cancel-room-btn">取消</button>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
      <div id="game-header">
        <div id="defender-info" class="player-info">
          <span class="player-label defender">🌱 防守方</span>
          <span class="sun-count" id="defender-sun">☀️ 150</span>
        </div>
        <div id="timer">⏱️ 3:00</div>
        <div id="attacker-info" class="player-info">
          <span class="sun-count" id="attacker-sun">☀️ 100</span>
          <span class="player-label attacker">🧟 进攻方</span>
        </div>
      </div>

      <div id="game-area">
        <div id="plant-panel" class="side-panel">
          <!-- Plant buttons inserted by JS -->
        </div>
        <canvas id="game-canvas" width="630" height="350"></canvas>
        <div id="zombie-panel" class="side-panel">
          <!-- Zombie buttons inserted by JS -->
        </div>
      </div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" class="screen hidden">
      <h1 id="result-title"></h1>
      <p id="result-detail"></p>
      <button id="restart-btn">再来一局</button>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/rng.js"></script>
  <script src="js/game.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/sun.js"></script>
  <script src="js/plants.js"></script>
  <script src="js/zombies.js"></script>
  <script src="js/projectiles.js"></script>
  <script src="js/input.js"></script>
  <script src="js/gamepad.js"></script>
  <script src="js/network.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
