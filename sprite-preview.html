<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sprite 预览</title>
<style>
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; gap: 40px; font-family: 'Segoe UI', sans-serif; }
  .preview { text-align: center; }
  canvas { border: 2px solid #444; border-radius: 8px; display: block; }
  .label { color: #fff; margin-top: 12px; font-size: 18px; }
  .sub { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div class="preview">
  <canvas id="c1" width="140" height="140"></canvas>
  <div class="label">🌻 向日葵</div>
  <div class="sub">before (emoji) → after (sprite)</div>
</div>
<div class="preview">
  <canvas id="c2" width="140" height="140"></canvas>
  <div class="label">🧟 普通僵尸</div>
  <div class="sub">before (emoji) → after (sprite)</div>
</div>
<script>
const SIZE = 56;
const CX = 70;
const CY = 70;

// === Helper ===
function hpBar(ctx, x, y, w, h, ratio) {
  ctx.fillStyle = '#333'; ctx.fillRect(x, y, w, h);
  ctx.fillStyle = ratio > 0.5 ? '#4CAF50' : ratio > 0.25 ? '#FFC107' : '#F44336';
  ctx.fillRect(x, y, w * ratio, h);
}

// === SUNFLOWER SPRITE ===
function drawSunflower(ctx, cx, cy, s) {
  const r = s * 0.4;
  // Petals
  ctx.fillStyle = '#FFD700';
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2;
    const px = cx + Math.cos(angle) * r * 0.8;
    const py = cy + Math.sin(angle) * r * 0.8;
    ctx.beginPath();
    ctx.ellipse(px, py, r * 0.35, r * 0.2, angle, 0, Math.PI * 2);
    ctx.fill();
  }
  // Center
  ctx.fillStyle = '#8B4513';
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.45, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx - 5, cy - 3, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 5, cy - 3, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(cx - 5, cy - 3, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 5, cy - 3, 2, 0, Math.PI * 2); ctx.fill();
  // Smile
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, cy + 2, 5, 0.1, Math.PI - 0.1); ctx.stroke();
  // Stem
  ctx.strokeStyle = '#228B22'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(cx, cy + r * 0.45);
  ctx.lineTo(cx, cy + s * 0.48); ctx.stroke();
}

// === NORMAL ZOMBIE SPRITE ===
function drawNormalZombie(ctx, cx, cy, s) {
  // Legs
  ctx.fillStyle = '#455A64';
  ctx.fillRect(cx - 10, cy + 10, 7, 22);
  ctx.fillRect(cx + 3, cy + 10, 7, 22);
  // Body
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(cx - 15, cy - 10, 30, 24);
  // Arms reaching forward
  ctx.strokeStyle = '#8FBC8F'; ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(cx - 15, cy - 5);
  ctx.lineTo(cx - 28, cy + 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 15, cy - 5);
  ctx.lineTo(cx + 28, cy + 5); ctx.stroke();
  // Head
  ctx.fillStyle = '#8FBC8F';
  ctx.beginPath(); ctx.arc(cx, cy - 20, 16, 0, Math.PI * 2); ctx.fill();
  // Hair
  ctx.strokeStyle = '#4E342E'; ctx.lineWidth = 2;
  for (let i = -8; i <= 8; i += 4) {
    ctx.beginPath(); ctx.moveTo(cx + i, cy - 34);
    ctx.lineTo(cx + i - 3, cy - 28); ctx.stroke();
  }
  // Eyes
  ctx.fillStyle = '#FFEB3B';
  ctx.beginPath(); ctx.arc(cx - 5, cy - 22, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 5, cy - 22, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx - 5, cy - 22, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 5, cy - 22, 1.5, 0, Math.PI * 2); ctx.fill();
  // Mouth
  ctx.fillStyle = '#4E342E';
  ctx.beginPath(); ctx.arc(cx, cy - 14, 4, 0, Math.PI); ctx.fill();
}

// === RENDER SPLIT: left=emoji, right=sprite ===
function renderSplit(canvasId, drawSprite, emoji) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  const half = 70;
  // Divider
  ctx.fillStyle = '#333'; ctx.fillRect(half - 1, 0, 2, 140);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1;

  // LEFT: emoji
  ctx.font = '36px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(emoji, half / 2, 55);
  hpBar(ctx, half / 2 - 20, 80, 40, 4, 0.8);
  ctx.fillStyle = '#666'; ctx.font = '11px sans-serif';
  ctx.fillText('emoji 版本', half / 2, 105);

  // RIGHT: sprite
  drawSprite(ctx, half + half / 2, 50, SIZE);
  hpBar(ctx, half + half / 2 - 20, 80, 40, 4, 0.8);
  ctx.fillStyle = '#4CAF50'; ctx.font = '11px sans-serif';
  ctx.fillText('sprite 版本', half + half / 2, 105);
}

renderSplit('c1', (ctx, x, y) => drawSunflower(ctx, x, y, SIZE), '🌻');
renderSplit('c2', (ctx, x, y) => drawNormalZombie(ctx, x, y, SIZE), '🧟');
</script>
</body>
</html>
