<h2>🖥️ 对战模式</h2>
<p class="subtitle">两个玩家如何对战？</p>

<div class="options">
  <div class="option" data-choice="local" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>同屏热座 (Hot-Seat)</h3>
      <p>同一台电脑，轮流操作。防守方布好阵后切换给进攻方派僵尸。简单直接</p>
    </div>
  </div>
  <div class="option" data-choice="network" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>网络对战</h3>
      <p>两台电脑通过网络连接。一方种植物，另一方派僵尸，实时对战</p>
    </div>
  </div>
  <div class="option" data-choice="ai" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>分屏实时</h3>
      <p>同一台电脑，屏幕分成两边，双方同时操作</p>
    </div>
  </div>
</div>
