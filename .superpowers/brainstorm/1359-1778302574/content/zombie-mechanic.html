<h2>🧟 进攻方（僵尸）怎么玩？</h2>
<p class="subtitle">核心玩法设计</p>

<div class="options">
  <div class="option" data-choice="spawn" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>消耗阳光召唤僵尸</h3>
      <p>和防守方一样收集阳光，用阳光"购买"不同种类的僵尸从右侧进攻。类似原作但由玩家控制</p>
    </div>
  </div>
  <div class="option" data-choice="wave" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>波次派兵</h3>
      <p>僵尸方有能量条，随时间增长。消耗能量派出僵尸或发动特殊攻击（如群体冲锋）</p>
    </div>
  </div>
  <div class="option" data-choice="control" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>直接操控僵尸</h3>
      <p>僵尸方可以手动控制每个僵尸移动、攻击，更像 RTS 风格</p>
    </div>
  </div>
</div>
