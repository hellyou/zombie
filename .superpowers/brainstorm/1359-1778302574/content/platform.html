<h2>🎮 选择游戏平台</h2>
<p class="subtitle">植物大战僵尸 - 双人对战</p>

<div class="options">
  <div class="option" data-choice="web" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Web 浏览器 (HTML5)</h3>
      <p>用 Canvas/WebGL + JavaScript/TypeScript，打开浏览器就能玩，无需安装</p>
    </div>
  </div>
  <div class="option" data-choice="desktop" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>桌面应用 (游戏引擎)</h3>
      <p>用 Unity、Godot 等引擎，性能更好，但需要下载安装</p>
    </div>
  </div>
  <div class="option" data-choice="cli" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>命令行终端</h3>
      <p>纯文本/ASCII 风格，轻量但缺少图形表现力</p>
    </div>
  </div>
</div>
