<h2>🎯 MVP 范围</h2>
<p class="subtitle">第一版包含多少内容？</p>

<h3>草坪规模</h3>
<div class="options">
  <div class="option" data-choice="3rows" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>3 行 × 7 列</h3>
      <p>紧凑战场，适合快速对局</p>
    </div>
  </div>
  <div class="option" data-choice="5rows" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>5 行 × 9 列</h3>
      <p>经典 PvZ 规模</p>
    </div>
  </div>
  <div class="option" data-choice="6rows" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>6 行 × 10 列</h3>
      <p>更大战场，更多策略空间</p>
    </div>
  </div>
</div>

<h3 style="margin-top: 24px;">植物 & 僵尸种类</h3>
<div class="options">
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>精简版 (3v3)</h3>
      <p>植物：向日葵、豌豆射手、坚果墙<br>僵尸：普通僵尸、路障僵尸、铁桶僵尸</p>
    </div>
  </div>
  <div class="option" data-choice="moderate" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>中等 (5v5)</h3>
      <p>植物：+ 土豆雷、樱桃炸弹<br>僵尸：+ 撑杆跳、读报僵尸</p>
    </div>
  </div>
  <div class="option" data-choice="full" onclick="toggleSelect(this)">
    <div class="letter">F</div>
    <div class="content">
      <h3>丰富 (7v7+)</h3>
      <p>更多种类，更多策略组合</p>
    </div>
  </div>
</div>
