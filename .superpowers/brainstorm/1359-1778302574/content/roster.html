<h2>🌱🧟 阵容列表</h2>
<p class="subtitle">第一版包含哪些单位？可以多选</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="sunflower" onclick="toggleSelect(this)">
    <div class="letter">🌻</div>
    <div class="content"><h3>向日葵</h3><p>生产额外阳光</p></div>
  </div>
  <div class="option" data-choice="peashooter" onclick="toggleSelect(this)">
    <div class="letter">🌱</div>
    <div class="content"><h3>豌豆射手</h3><p>基础攻击植物</p></div>
  </div>
  <div class="option" data-choice="wallnut" onclick="toggleSelect(this)">
    <div class="letter">🥜</div>
    <div class="content"><h3>坚果墙</h3><p>高血量防御</p></div>
  </div>
  <div class="option" data-choice="snowpea" onclick="toggleSelect(this)">
    <div class="letter">❄️</div>
    <div class="content"><h3>寒冰射手</h3><p>减速僵尸</p></div>
  </div>
  <div class="option" data-choice="potatomine" onclick="toggleSelect(this)">
    <div class="letter">💣</div>
    <div class="content"><h3>土豆雷</h3><p>近距离爆炸</p></div>
  </div>
  <div class="option" data-choice="cherrybomb" onclick="toggleSelect(this)">
    <div class="letter">🍒</div>
    <div class="content"><h3>樱桃炸弹</h3><p>范围爆炸</p></div>
  </div>
  <div class="option" data-choice="repeater" onclick="toggleSelect(this)">
    <div class="letter">🔫</div>
    <div class="content"><h3>双发射手</h3><p>一次射两发</p></div>
  </div>
</div>

<h3 style="margin-top: 24px;">🧟 僵尸阵容（多选）</h3>
<div class="options" data-multiselect>
  <div class="option" data-choice="normal" onclick="toggleSelect(this)">
    <div class="letter">🧟</div>
    <div class="content"><h3>普通僵尸</h3><p>基础僵尸，均衡</p></div>
  </div>
  <div class="option" data-choice="cone" onclick="toggleSelect(this)">
    <div class="letter">🪖</div>
    <div class="content"><h3>路障僵尸</h3><p>更多血量</p></div>
  </div>
  <div class="option" data-choice="bucket" onclick="toggleSelect(this)">
    <div class="letter">⛑️</div>
    <div class="content"><h3>铁桶僵尸</h3><p>高血量坦克</p></div>
  </div>
  <div class="option" data-choice="pole" onclick="toggleSelect(this)">
    <div class="letter">🏃</div>
    <div class="content"><h3>撑杆跳僵尸</h3><p>跳过第一个植物</p></div>
  </div>
  <div class="option" data-choice="newspaper" onclick="toggleSelect(this)">
    <div class="letter">📰</div>
    <div class="content"><h3>读报僵尸</h3><p>被打后狂暴加速</p></div>
  </div>
  <div class="option" data-choice="football" onclick="toggleSelect(this)">
    <div class="letter">🏈</div>
    <div class="content"><h3>橄榄球僵尸</h3><p>高速高血量</p></div>
  </div>
  <div class="option" data-choice="screendoor" onclick="toggleSelect(this)">
    <div class="letter">🛡️</div>
    <div class="content"><h3>栅栏僵尸</h3><p>抵挡远程攻击</p></div>
  </div>
</div>
