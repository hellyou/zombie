<h2>☀️ 阳光系统</h2>
<p class="subtitle">资源怎么分配？</p>

<div class="options">
  <div class="option" data-choice="separate" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>各自独立阳光</h3>
      <p>双方各自收集自己的阳光。天上掉阳光双方各拿各的，向日葵只给防守方产阳光</p>
    </div>
  </div>
  <div class="option" data-choice="shared" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>共享阳光池</h3>
      <p>所有人都抢同一片阳光，谁先点谁得。紧张刺激</p>
    </div>
  </div>
  <div class="option" data-choice="auto" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>自动增长</h3>
      <p>双方阳光自动随时间增长（防守方略多），不用手动收集</p>
    </div>
  </div>
</div>
